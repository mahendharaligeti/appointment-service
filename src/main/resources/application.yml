spring:
  application:
    name: appointment-service
  jpa:
    open-in-view: false
    properties:
      hibernate:
        generate_statistics: true

server:
  port: 8082
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:hospital-secret-key-test-12345678901234567890}
    expiration: 86400000

user-service:
  base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}}

jdbc:
  datasource-proxy:
    type: SPRING_PROXY
  query:
    enabled: true
  connection:
    enabled: true
  resultset-operations:
    enabled: false
logging:
  level:
    root: INFO
    com.hospital.appointmentservice: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{requestId:-}] "
  include-application-name: false
