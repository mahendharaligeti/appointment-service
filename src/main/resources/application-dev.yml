spring:
  datasource:
    url: jdbc:mysql://localhost:3306/AppointmentService
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootroot}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
