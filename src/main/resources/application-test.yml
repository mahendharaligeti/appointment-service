spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

management:
  tracing:
    sampling:
      probability: 0.0

jdbc:
  datasource-proxy:
    enabled: false

logging:
  level:
    root: WARN
    com.hospital.appointmentservice: INFO
