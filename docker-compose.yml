version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service_db
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  user-service:
    image: user-service:1.0.0
    container_name: user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-for-local-testing}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: user_service_db
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  appointment-service:
    image: appointment-service:1.0.0
    container_name: appointment-service
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-for-local-testing}
      DB_URL: jdbc:mysql://mysql:3306/appointment_service_db
      DB_USERNAME: root
      DB_PASSWORD: root
      USER_SERVICE_URL: http://user-service:8081
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      TRACING_SAMPLING_PROBABILITY: 1.0
    ports:
      - "8082:8082"
    depends_on:
      user-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: hospital-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - hospital-network

volumes:
  mysql_data:

networks:
  hospital-network:
    driver: bridge
